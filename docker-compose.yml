services:
  app:
    build:
      context: ./back2me-api
      dockerfile: Dockerfile
    container_name: back2me_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./back2me-api:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: back2me
      DB_USERNAME: back2me
      DB_PASSWORD: back2me
    depends_on:
      db:
        condition: service_healthy
    networks:
      - back2me

  nginx:
    image: nginx:1.27-alpine
    container_name: back2me_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./back2me-api:/var/www/html
      - ./back2me-api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - back2me

  db:
    image: mysql:8.4
    container_name: back2me_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: back2me
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: back2me
      MYSQL_PASSWORD: back2me
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - back2me

volumes:
  db_data:

networks:
  back2me:
    driver: bridge
